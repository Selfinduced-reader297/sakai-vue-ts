name: Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea? We'd love to hear it! Please describe your request as clearly as possible.

  - type: textarea
    id: summary
    attributes:
      label: What would you like?
      description: A clear and concise description of the feature you'd like to see.
      placeholder: I'd like...
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Why is this needed?
      description: What problem does this solve? What's the use case?
      placeholder: This would help me because...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Do you have a specific approach in mind? (optional)
      placeholder: I think it could work by...

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about? (optional)
      placeholder: Another option could be...

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, links, references, screenshots, etc.
      placeholder: Here are some references...
